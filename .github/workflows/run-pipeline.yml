name: Run leaderboard pipeline

on:
  schedule:
    - cron: '30 4 * * *'   # ~04:30 UTC -- after the 00Z FCOO run is published
    - cron: '30 16 * * *'  # ~16:30 UTC -- after the 12Z FCOO run is published
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # required so this workflow can commit + push results back

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set date output
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python + dependencies
        run: |
          uv python install 3.12
          uv sync --frozen

      - name: Restore FCOO file cache
        uses: actions/cache@v4
        with:
          path: data/fcoo_cache
          # Key includes the date so we prefer a same-day file, but fall back
          # to any previous entry (restore-keys) when today's hasn't downloaded yet.
          key: fcoo-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: fcoo-${{ runner.os }}-

      - name: Run pipeline
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_PASSWORD }}
        run: uv run main.py

      - name: Save FCOO file cache
        uses: actions/cache/save@v4
        if: always()   # save even if pipeline step failed, to keep partial progress
        with:
          path: data/fcoo_cache
          key: fcoo-${{ runner.os }}-${{ steps.date.outputs.date }}

      - name: Commit updated state + exported JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/store docs/data
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Update leaderboard $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
