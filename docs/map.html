<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argo Float Map — Baltic Sea</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper:    #FFFFFF;
    --paper-2:  #FFFFFF;
    --chip:     #F1F1ED;
    --ink-0:    #16160F;
    --ink-1:    #44443C;
    --ink-2:    #8C8C82;
    --line:     rgba(20,20,15,0.10);
    --line-hi:  rgba(20,20,15,0.20);
    --blue:     #147D74;
    --blue-lt:  #3E5C8A;
    --coral:    #D6422E;
    --font-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --panel-w:   360px;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--paper);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums;
  }

  /* ── Layout ── */
  #shell { display: flex; flex-direction: column; height: 100vh; }

  /* ── Top bar ── */
  #topbar {
    flex-shrink: 0;
    background: var(--paper-2);
    border-bottom: 1px solid var(--line-hi);
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 0 24px;
    height: 60px;
    z-index: 1000;
    position: relative;
  }
  .bar-brand { display: flex; align-items: center; gap: 13px; }
  .bar-mark { display: flex; align-items: center; gap: 4px; }
  .bar-mark .d { width: 13px; height: 13px; border-radius: 50%; }
  .bar-mark .p { width: 9px; height: 20px; border-radius: 999px; }
  .bar-title {
    font-size: 17px;
    color: var(--ink-0);
    letter-spacing: -0.02em;
    font-weight: 700;
    white-space: nowrap;
  }
  .bar-subtitle {
    font-size: 11px;
    color: var(--ink-2);
    letter-spacing: 0.04em;
    margin-top: 1px;
  }
  .bar-sep { flex: 1; }
  .updated-badge {
    font-size: 11px;
    color: var(--ink-2);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .bar-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: var(--ink-0);
    border: 1px solid var(--ink-0);
    color: var(--paper);
    text-decoration: none;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
    border-radius: 999px;
  }
  .bar-link:hover { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* ── Map + panel row ── */
  #body-row { flex: 1; display: flex; min-height: 0; position: relative; }

  /* ── Leaflet map ── */
  #map { flex: 1; height: 100%; }
  .leaflet-container { background: #E4E9EE; }

  /* ── Legend ── */
  #legend {
    position: absolute;
    bottom: 28px;
    left: 18px;
    z-index: 900;
    background: rgba(255,255,255,0.94);
    border: 1px solid var(--line-hi);
    padding: 16px 18px;
    backdrop-filter: blur(8px);
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(20,20,15,0.08);
  }
  .legend-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-2);
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 11px;
    margin-bottom: 8px;
  }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-diamond {
    width: 11px; height: 11px;
    border: 2px solid;
    transform: rotate(45deg);
    flex-shrink: 0;
    background: transparent;
  }
  .legend-line {
    width: 22px; height: 2px;
    flex-shrink: 0;
  }
  .legend-label {
    font-size: 11px;
    color: var(--ink-1);
    letter-spacing: 0.01em;
  }
  .legend-divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 11px 0;
  }

  /* ── Side panel ── */
  #panel {
    width: var(--panel-w);
    min-width: var(--panel-w);
    background: var(--paper-2);
    border-left: 1px solid var(--line-hi);
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.22s ease;
    z-index: 500;
    position: relative;
  }
  #panel.open { transform: translateX(0); }

  .panel-header {
    position: sticky;
    top: 0;
    background: var(--paper-2);
    border-bottom: 1px solid var(--line);
    padding: 22px 22px 18px;
    z-index: 1;
  }
  .panel-wmo {
    font-size: 22px;
    color: var(--ink-0);
    letter-spacing: -0.02em;
    font-weight: 700;
  }
  .panel-wmo a {
    color: var(--blue);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .panel-wmo a:hover { border-color: var(--blue); }
  .panel-close {
    position: absolute;
    right: 18px;
    top: 18px;
    background: none;
    border: 1px solid var(--line-hi);
    color: var(--ink-2);
    cursor: pointer;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    border-radius: 999px;
  }
  .panel-close:hover { border-color: var(--ink-0); color: var(--ink-0); background: var(--paper); }

  .panel-body { padding: 20px 22px; }

  /* Panel sections */
  .p-section { margin-bottom: 26px; }
  .p-section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-2);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
    font-weight: 600;
  }
  .p-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    gap: 8px;
  }
  .p-key {
    font-size: 12px;
    color: var(--ink-2);
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }
  .p-val {
    font-size: 12px;
    color: var(--ink-0);
    text-align: right;
    word-break: break-all;
    font-weight: 500;
  }
  .p-val.mono-data { font-size: 12px; }

  /* Model sub-sections */
  .p-model {
    border: 1px solid var(--line);
    margin-bottom: 12px;
    padding: 14px 15px;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
  }
  .p-model-name {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 0.01em;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .p-model-name .swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Scroll bar */
  #panel::-webkit-scrollbar { width: 5px; }
  #panel::-webkit-scrollbar-track { background: var(--paper-2); }
  #panel::-webkit-scrollbar-thumb { background: var(--line-hi); border-radius: 3px; }

  /* Leaflet popup override (not used but prevents flash) */
  .leaflet-popup { display: none !important; }

  /* Loading overlay */
  #loading {
    position: absolute;
    inset: 0;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    flex-direction: column;
    gap: 16px;
  }
  #loading.hidden { display: none; }
  .load-text {
    font-size: 12px;
    color: var(--ink-2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .load-spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--line);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="shell">

  <div id="topbar">
    <div class="bar-brand">
      <div>
        <div class="bar-title">Argo Float Monitor</div>
        <div class="bar-subtitle">Baltic Sea · Model Forecast Trajectories</div>
      </div>
    </div>
    <div class="bar-sep"></div>
    <span class="updated-badge" id="updated-badge"></span>
    <a href="index.html" class="bar-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
      </svg>
      Leaderboard
    </a>
  </div>

  <div id="body-row">
    <div id="loading">
      <div class="load-spinner"></div>
      <div class="load-text">Fetching float positions…</div>
    </div>

    <div id="map"></div>

    <div id="legend">
      <div class="legend-title">Map Key</div>
      <div class="legend-row">
        <div class="legend-dot" style="background:#147D74"></div>
        <span class="legend-label">CMEMS Baltic</span>
      </div>
      <div class="legend-row">
        <div class="legend-dot" style="background:#C2872A"></div>
        <span class="legend-label">FCOO GETM</span>
      </div>
      <hr class="legend-divider">
      <div class="legend-row">
        <div class="legend-dot" style="background:#D6422E;border:1.5px solid rgba(255,255,255,0.9)"></div>
        <span class="legend-label">Last real surfacing</span>
      </div>
      <div class="legend-row">
        <div class="legend-line" style="background:linear-gradient(to right,#D6422E 55%,transparent 55%);background-size:7px 100%;opacity:0.85"></div>
        <span class="legend-label">Real surfacing track</span>
      </div>
      <div class="legend-row">
        <div class="legend-diamond" style="border-color:#8C8C82"></div>
        <span class="legend-label">Next surfacing est.</span>
      </div>
      <div class="legend-row">
        <div class="legend-line" style="background:#8C8C82"></div>
        <span class="legend-label">Trajectory history</span>
      </div>
      <div class="legend-row">
        <div class="legend-dot" style="background:#8C8C82;width:6px;height:6px"></div>
        <span class="legend-label">Predicted at surfacing</span>
      </div>
      <div class="legend-row">
        <div class="legend-line" style="background:#8C8C82;height:2px"></div>
        <span class="legend-label">Forecast leg (actual simulated path)</span>
      </div>
      <div class="legend-row">
        <div class="legend-line" style="background:linear-gradient(to right,#8C8C82 40%,transparent 40%);background-size:6px 100%;opacity:0.85"></div>
        <span class="legend-label">Predicted → real (error)</span>
      </div>
    </div>

    <div id="panel">
      <div class="panel-header">
        <div class="panel-wmo" id="panel-wmo"></div>
        <button class="panel-close" id="panel-close" aria-label="Close">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </div>
</div>

<script>
function _showFatalError(msg) {
  const el = document.getElementById('loading');
  if (el) el.innerHTML =
    `<div style="color:#D6422E;font-family:sans-serif;font-size:13px;padding:24px;line-height:1.9;max-width:520px">
      <b>Map init error</b><br>${msg}<br><br>
      <span style="color:#8C8C82">Page: ${location.href}</span>
    </div>`;
}
window.onerror = (msg, src, line) => { _showFatalError(`${msg} (${src}:${line})`); };

// ─── Constants ────────────────────────────────────────────────────────────────
const MODEL_COLORS = {
  cmems: '#147D74',
  fcoo:  '#C2872A',
};
const MODEL_NAMES = {
  cmems: 'CMEMS Baltic',
  fcoo:  'FCOO GETM',
};

// ─── Leaflet setup ────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [56.5, 16.0],
  zoom: 6,
  zoomControl: false,
  attributionControl: true,
});

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }
).addTo(map);

// ─── State ────────────────────────────────────────────────────────────────────
let activeFloat = null;
const overlayLayers = [];    // things shown on click (trajectories, surf markers)
let currentFloatData = null; // full data for the currently selected float

// ─── Panel helpers ────────────────────────────────────────────────────────────
const panel     = document.getElementById('panel');
const panelWmo  = document.getElementById('panel-wmo');
const panelBody = document.getElementById('panel-body');

document.getElementById('panel-close').addEventListener('click', closePanel);

function closePanel() {
  panel.classList.remove('open');
  activeFloat = null;
  clearOverlays();
}

function clearOverlays() {
  overlayLayers.forEach(l => map.removeLayer(l));
  overlayLayers.length = 0;
}

// ─── Custom marker SVGs ───────────────────────────────────────────────────────
function circleIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16">
    <circle cx="8" cy="8" r="6" fill="${color}" fill-opacity="0.92" stroke="#fff" stroke-width="1.6"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [16, 16],
    iconAnchor: [8, 8],
    popupAnchor: [0, -10],
  });
}

function realPositionIcon() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16">
    <circle cx="8" cy="8" r="6" fill="#D6422E" stroke="#fff" stroke-width="1.8"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [16,16], iconAnchor: [8,8] });
}

function anchorIcon() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14">
    <circle cx="7" cy="7" r="5" fill="none" stroke="#D6422E" stroke-width="1.6" stroke-dasharray="2,2"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

function diamondIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14">
    <rect x="3" y="3" width="8" height="8" rx="0" fill="#fff" stroke="${color}" stroke-width="1.8" transform="rotate(45 7 7)"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

// ─── Panel rendering ──────────────────────────────────────────────────────────
function renderPanel(f) {
  const ca = f.cycle_action;
  const lrp = f.last_real_position;

  // WMO header
  panelWmo.innerHTML = `
    Float &nbsp;<a href="${f.euro_argo_url}" target="_blank" rel="noopener">${f.float_id}</a>
  `;

  // Build HTML
  let html = '';

  // Last real position block
  html += `
    <div class="p-section">
      <div class="p-section-label">Last Confirmed Surfacing</div>
      <div class="p-row">
        <span class="p-key">Position</span>
        <span class="p-val mono-data">${lrp.lat.toFixed(4)}° N, ${lrp.lon.toFixed(4)}° E</span>
      </div>
      <div class="p-row">
        <span class="p-key">Time (UTC)</span>
        <span class="p-val">${fmtTime(lrp.time)}</span>
      </div>
    </div>
  `;

  // Cycle action block
  html += `
    <div class="p-section">
      <div class="p-section-label">Dive Profile</div>
      <div class="p-row">
        <span class="p-key">Mode</span>
        <span class="p-val">${fmtParkMode(ca.park_mode)}</span>
      </div>
      ${ca.target_depth !== null ? `
      <div class="p-row">
        <span class="p-key">Depth</span>
        <span class="p-val mono-data">${ca.target_depth} dbar</span>
      </div>` : ''}
      <div class="p-row">
        <span class="p-key">Submerged</span>
        <span class="p-val mono-data">${fmtHours(ca.cycle_hours)}</span>
      </div>
      <div class="p-row">
        <span class="p-key">Descent</span>
        <span class="p-val mono-data">${(ca.descent_speed_ms * 100).toFixed(1)} cm/s</span>
      </div>
      <div class="p-row">
        <span class="p-key">Ascent</span>
        <span class="p-val mono-data">${(ca.ascent_speed_ms * 100).toFixed(1)} cm/s</span>
      </div>
      <div class="p-row">
        <span class="p-key">Transmission</span>
        <span class="p-val mono-data">${ca.transmission_duration_minutes.toFixed(0)} min</span>
      </div>
    </div>
  `;

  // Per-model blocks
  html += `<div class="p-section"><div class="p-section-label">Model Predictions</div>`;
  for (const [key, m] of Object.entries(f.models)) {
    const color = MODEL_COLORS[key] || '#8C8C82';
    html += `
      <div class="p-model" style="--model-color:${color}">
        <div class="p-model-name" style="color:${color}"><span class="swatch" style="background:${color}"></span>${m.display_name}</div>
        ${m.predicted_now ? `
        <div class="p-row">
          <span class="p-key">Position now</span>
          <span class="p-val mono-data">${m.predicted_now.lat.toFixed(4)}°&thinsp;N, ${m.predicted_now.lon.toFixed(4)}°&thinsp;E</span>
        </div>` : '<div class="p-row"><span class="p-key">Position now</span><span class="p-val">—</span></div>'}
        <div class="p-row">
          <span class="p-key">Next surface</span>
          <span class="p-val">${fmtTime(m.next_surfacing_time)}</span>
        </div>
        ${m.next_surfacing_position ? `
        <div class="p-row">
          <span class="p-key">Est. position</span>
          <span class="p-val mono-data">${m.next_surfacing_position.lat.toFixed(4)}°&thinsp;N, ${m.next_surfacing_position.lon.toFixed(4)}°&thinsp;E</span>
        </div>` : ''}
        ${m.missed_model_pulls > 0 ? `
        <div class="p-row">
          <span class="p-key" style="color:#D6422E">Stale pulls</span>
          <span class="p-val" style="color:#D6422E">${m.missed_model_pulls}</span>
        </div>` : ''}
      </div>
    `;
  }
  html += '</div>';

  panelBody.innerHTML = html;
}

// ─── Draw overlays for a selected float ───────────────────────────────────────
function drawFloatOverlays(f) {
  clearOverlays();

  // Surfacing history track (real confirmed positions)
  const hist = f.surfacing_history || [];
  if (hist.length >= 2) {
    const latlngs = hist.map(p => [p.lat, p.lon]);
    const histPoly = L.polyline(latlngs, { color: '#D6422E', weight: 1.6, opacity: 0.7, dashArray: '4 5' });
    histPoly.addTo(map);
    overlayLayers.push(histPoly);
  }
  for (const p of hist) {
    const dot = L.circleMarker([p.lat, p.lon], {
      radius: 3.5, color: '#D6422E', fillColor: '#D6422E', fillOpacity: 0.7, weight: 1,
    });
    dot.bindTooltip(`Real surfacing<br>${fmtTime(p.time)}`, { direction: 'top' });
    dot.addTo(map);
    overlayLayers.push(dot);
  }

  // Past scoring events: each model's predicted position at a real surfacing.
  // Two segments per event so it's clear which forecast leg produced which
  // prediction:
  //   1. leg line (solid, model color): the actual simulated path for that
  //      cycle, from pred.path (run.py's leg_history, captured right before
  //      an anchor reset would otherwise discard it -- only exists for legs
  //      completed after that capture was added). Falls back to a straight
  //      line from leg_start (the exact anchor the leg started from) to the
  //      predicted position for older legs with no captured path.
  //   2. error line (dotted, model color): predicted -> real -- the gap
  //      between forecast and reality.
  const scoring = f.scoring_history || [];

  for (const ev of scoring) {
    for (const [key, pred] of Object.entries(ev.predictions)) {
      const color = MODEL_COLORS[key] || '#8C8C82';
      const name  = MODEL_NAMES[key] || key;

      const legPoints = (pred.path && pred.path.length >= 2)
        ? pred.path
        : (ev.leg_start ? [[ev.leg_start.lat, ev.leg_start.lon], [pred.lat, pred.lon]] : null);

      if (legPoints) {
        const legLine = L.polyline(legPoints, { color, weight: 2, opacity: 0.6 });
        legLine.bindTooltip(`${name} forecast leg → ${fmtTime(ev.t)}`, { direction: 'top' });
        legLine.addTo(map);
        overlayLayers.push(legLine);
      }

      const errLine = L.polyline(
        [[pred.lat, pred.lon], [ev.real.lat, ev.real.lon]],
        { color, weight: 1.5, opacity: 0.75, dashArray: '2 4' }
      );
      errLine.addTo(map);
      overlayLayers.push(errLine);

      const dot = L.circleMarker([pred.lat, pred.lon], {
        radius: 3, color, fillColor: color, fillOpacity: 0.85, weight: 1,
      });
      dot.bindTooltip(
        `${name} predicted<br>${fmtTime(ev.t)}<br>error: ${pred.error_km.toFixed(1)} km`,
        { direction: 'top' }
      );
      dot.addTo(map);
      overlayLayers.push(dot);
    }
  }

  // Last real position marker (dashed circle)
  const lrp = f.last_real_position;
  const anchorM = L.marker([lrp.lat, lrp.lon], { icon: anchorIcon(), zIndexOffset: 100 });
  anchorM.bindTooltip(`Last real position<br>${fmtTime(lrp.time)}`, { className: 'leaflet-tooltip-custom' });
  anchorM.addTo(map);
  overlayLayers.push(anchorM);

  // Per-model: trajectory polyline + next surfacing diamond
  for (const [key, m] of Object.entries(f.models)) {
    const color = MODEL_COLORS[key] || '#8C8C82';

    // Trajectory history polyline
    if (m.trajectory_history.length >= 2) {
      const latlngs = m.trajectory_history.map(p => [p.lat, p.lon]);
      const poly = L.polyline(latlngs, {
        color,
        weight: 2,
        opacity: 0.7,
        dashArray: '4 4',
      });
      poly.addTo(map);
      overlayLayers.push(poly);
    }

    // Next surfacing marker (diamond)
    if (m.next_surfacing_position) {
      const sp = m.next_surfacing_position;
      const surfM = L.marker([sp.lat, sp.lon], { icon: diamondIcon(color), zIndexOffset: 200 });
      surfM.bindTooltip(
        `${m.display_name}<br>Next surface: ${fmtTime(m.next_surfacing_time)}<br>${sp.lat.toFixed(4)}° N, ${sp.lon.toFixed(4)}° E`,
        { className: 'leaflet-tooltip-custom' }
      );
      surfM.addTo(map);
      overlayLayers.push(surfM);
    }
  }
}

// ─── Float click handler ──────────────────────────────────────────────────────
function onFloatClick(f) {
  if (activeFloat === f.float_id) {
    closePanel();
    return;
  }
  activeFloat = f.float_id;
  renderPanel(f);
  drawFloatOverlays(f);
  panel.classList.add('open');
}

// ─── Formatting helpers ───────────────────────────────────────────────────────
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.includes('Z') ? '' : 'Z'));
  return d.toISOString().replace('T', ' ').slice(0, 16) + ' UTC';
}

function fmtHours(h) {
  if (h >= 24) return `${(h / 24).toFixed(1)} d`;
  return `${h.toFixed(1)} h`;
}

function fmtParkMode(mode) {
  const map = {
    park_on_bottom:  'Park on seabed',
    parking_depth:   'Drift at depth',
    drift_on_surface: 'Surface drift',
  };
  return map[mode] || mode;
}

// ─── Main data load ───────────────────────────────────────────────────────────
async function init() {
  const dataUrl = new URL('data/floats.json', window.location.href).href;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 15000);
  let res;
  try {
    res = await fetch(dataUrl, { signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${dataUrl}`);
  const data = await res.json();

  // Badge
  const d = new Date(data.updated_at + (data.updated_at.includes('Z') ? '' : 'Z'));
  document.getElementById('updated-badge').textContent =
    `Updated ${d.toUTCString().replace(' GMT', ' UTC')}`;

  // Place markers (default visible layer)
  for (const f of data.floats) {
    // Last real surfacing position — ink dot
    const lrp = f.last_real_position;
    const lrpM = L.marker([lrp.lat, lrp.lon], { icon: realPositionIcon(), zIndexOffset: 80 });
    lrpM.bindTooltip(
      `Float ${f.float_id}<br>Last real surfacing<br>${fmtTime(lrp.time)}`,
      { direction: 'top', offset: [0, -6] }
    );
    lrpM.on('click', () => onFloatClick(f));
    lrpM.addTo(map);

    // Model predicted-now markers
    for (const [key, m] of Object.entries(f.models)) {
      if (!m.predicted_now) continue;
      const color = MODEL_COLORS[key] || '#8C8C82';
      const pos   = [m.predicted_now.lat, m.predicted_now.lon];
      const marker = L.marker(pos, { icon: circleIcon(color), zIndexOffset: 50 });
      marker.bindTooltip(
        `Float ${f.float_id}<br>${m.display_name}`,
        { direction: 'top', offset: [0, -6] }
      );
      marker.on('click', () => onFloatClick(f));
      marker.addTo(map);
    }
  }

  document.getElementById('loading').classList.add('hidden');
}
